<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">
    <style>
        @page {
            size: letter;
            margin: 1in;
            @top-right {
                content: "{{ project.report_date_formatted }}";
                font-family: Arial, sans-serif;
                font-size: 10pt;
                color: #555;
            }
        }
        body {
            font-family: Arial, sans-serif;
            font-size: 11pt;
            line-height: 1.6;
            color: #333;
        }
        h1, h2, h3 {
            color: #2c3e50;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        p {
            margin-bottom: 15px;
        }
        .header-logo {
            text-align: right;
            margin-bottom: 40px;
        }
        .header-logo img {
            max-width: 200px;
            max-height: 80px;
        }
    </style>
</head>
<body>
    <div class="content">
        {{ content }}
    </div>
</body>
</html>
