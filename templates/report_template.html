<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ project.name }} - Penetration Test Report</title>
    <style>
        /* PDF specific CSS for WeasyPrint */
        @page {
            size: A4;
            margin: 2.5cm 2cm 2.5cm 2cm;
            @top-right {
                content: "Strictly Confidential";
                color: #666;
                font-size: 10pt;
            }
            @bottom-right {
                content: "Page " counter(page) " of " counter(pages);
                font-size: 10pt;
                color: #666;
            }
            @bottom-left {
                content: "{{ firm.firm_name }}";
                font-size: 10pt;
                color: #666;
            }
        }
        
        h1, h2, h3 {
            page-break-after: avoid;
        }
        
        @page:first {
            @top-right { content: normal; }
            @bottom-right { content: normal; }
            @bottom-left { content: normal; }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 11pt;
            line-height: 1.6;
            color: #333;
        }

        h1, h2, h3, h4 { color: #1a202c; page-break-after: avoid; }
        h1 { font-size: 24pt; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        h1:first-of-type { page-break-before: avoid; }
        h2 { font-size: 18pt; margin-top: 1.5em; }
        h3 { font-size: 14pt; margin-top: 1em; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #e2e8f0;
            padding: 8px;
            text-align: left;
        }
        th { background-color: #edf2f7; font-weight: bold; }
        
        /* Tools Table Specific Styles */
        .tools-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .tools-table th, .tools-table td {
            border: 1px solid #333;
            padding: 10px;
        }
        .tools-table th {
            background-color: #555;
            color: white;
            font-weight: bold;
            text-align: center;
        }
        .tools-table td:first-child {
            font-weight: bold;
            text-align: center;
            vertical-align: middle;
            width: 25%;
        }
        .tools-table td:last-child {
            text-align: left;
            vertical-align: top;
        }
        
        .severity-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 10pt;
            color: white;
            text-transform: uppercase;
        }

        .Critical { background-color: #9b2c2c; }
        .High { background-color: #c53030; }
        .Medium { background-color: #dd6b20; }
        .Low { background-color: #38a169; }
        .Informational, .Info { background-color: #3182ce; }
        /* Table of Contents Styles */
        .toc ul {
            list-style-type: none;
            padding: 0;
        }
        .toc ul ul {
            padding-left: 20px;
        }
        .toc li {
            margin-bottom: 5px;
        }
        .toc a {
            text-decoration: none;
            color: inherit;
            display: block; /* Helps ensure leader fills the line */
        }
        .toc a::after {
            content: leader('.') target-counter(attr(href), page);
        }
        
        /* Markdown generated content styles */
        .markdown-content img, img { max-width: 100%; height: auto; border: 1px solid #ccc; margin-top: 10px; border-radius: 4px; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 4px; overflow-x: auto; }
        code { font-family: monospace; background: #f4f4f4; padding: 2px 4px; border-radius: 2px;}
    </style>
</head>
<body>
    {{ body | safe }}
</body>
</html>
